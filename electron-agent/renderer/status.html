<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>NexusIT Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="logo">⚡ NexusIT Agent</span>
    <span id="badge" class="badge badge--disconnected">○ Disconnected</span>
  </div>

  <!-- Device Info -->
  <div class="section">
    <div class="row">
      <span class="row-label">Device</span>
      <span class="row-value" id="hostname">—</span>
    </div>
    <div class="row">
      <span class="row-label">OS</span>
      <span class="row-value" id="os-version">—</span>
    </div>
    <div class="row">
      <span class="row-label">Local IP</span>
      <span class="row-value" id="local-ip">—</span>
    </div>
    <div class="row">
      <span class="row-label">Server</span>
      <span class="row-value row-value--accent" id="server-url">—</span>
    </div>
  </div>

  <!-- Live Stats -->
  <div class="section">
    <div class="stat">
      <div class="stat-header">
        <span>CPU Usage</span>
        <span class="stat-pct" id="cpu-pct">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="cpu-bar"></div></div>
    </div>
    <div class="stat">
      <div class="stat-header">
        <span>Memory</span>
        <span class="stat-pct" id="mem-pct">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="mem-bar"></div></div>
    </div>
    <div class="stat">
      <div class="stat-header">
        <span>Disk (C:)</span>
        <span class="stat-pct" id="disk-pct">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="disk-bar"></div></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-meta">
      <div id="last-beat">Not connected</div>
      <div id="agent-ver" style="color:#1e3a4d;font-size:10px">v1.0.0</div>
    </div>
    <button class="btn" id="btn-dashboard">Open Dashboard</button>
  </div>

  <script src="status.js"></script>
</body>
</html>
