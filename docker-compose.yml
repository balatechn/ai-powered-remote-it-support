# =============================================
# NexusIT Remote IT Support Platform
# =============================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexusit}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusit-network

  # ─── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusit-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusit-network

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusit-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ai_it_support}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      AGENT_SECRET: ${AGENT_SECRET:-change_this_agent_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DOWNLOADS_DIR: /opt/nexusit/downloads-static
    volumes:
      - ./agent:/opt/nexusit/agent:ro
      - /opt/nexusit/downloads-static:/opt/nexusit/downloads-static:ro
    networks:
      - nexusit-network

  # ─── Frontend Dashboard ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3080:80"
    networks:
      - nexusit-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nexusit-network:
    driver: bridge
